# Tag-driven release: push v* → build → GitHub Release → PyPI
# Requires PyPI Trusted Publisher (see README 「发布」).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: |
            ## Install
            ```bash
            pip install maimai-mcp
            ```

            - PyPI: https://pypi.org/project/maimai-mcp/
            - Tag: `${{ github.ref_name }}`

            Static assets are **not** included; set `MAIMAIDX_PATH` after installing.

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/maimai-mcp
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # OIDC Trusted Publisher: project maimai-mcp, workflow release.yml, env pypi
          # skip-existing: same file already on PyPI is OK (e.g. re-run); bump version for new releases
          skip-existing: true
